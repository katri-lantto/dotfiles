# ── Flexoki Dark — tmux theme ─────────────────────────────────────────────────
#
# Palette reference:
#   bg       #100F0F    bg2      #1C1B1A    bg3      #282726
#   tx       #CECDC3    tx2      #6F6E69    tx3      #878580
#   red      #D14D41    orange   #DA702C    yellow   #D0A215
#   green    #879A39    cyan     #3AA99F    blue     #4385BE
#   purple   #8B7EC8    magenta  #CE5D97
#
# Powerline separators (requires a Nerd Font):
#   solid right:   solid left:
# ──────────────────────────────────────────────────────────────────────────────

# True-colour support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Base ───────────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-justify  left
set -g status-position bottom

set -g status-style "bg=#1C1B1A,fg=#CECDC3"

# ── Left: session pill ─────────────────────────────────────────────────────────
#   ▏ blue bg ▏ session name ▏ blue→bg2 arrow ▏
set -g status-left-length 40
set -g status-left "\
#[bg=#4385BE,fg=#100F0F,bold]  #S \
#[bg=#1C1B1A,fg=#4385BE,nobold]"

# ── Right: git branch · cwd · time ────────────────────────────────────────────
#   ▏ arrow into bg3 ▏ time ▏ arrow into blue ▏ date ▏
set -g status-right-length 80
set -g status-right "\
#[fg=#282726,bg=#1C1B1A]\
#[fg=#878580,bg=#282726] #{b:pane_current_path} \
#[fg=#4385BE,bg=#282726]\
#[fg=#100F0F,bg=#4385BE,bold] %H:%M \
#[fg=#3AA99F,bg=#4385BE]\
#[fg=#100F0F,bg=#3AA99F] %d %b "

# ── Window tabs ────────────────────────────────────────────────────────────────
set -g window-status-separator ""

# inactive: plain text
set -g window-status-format "\
#[fg=#1C1B1A,bg=#1C1B1A]\
#[fg=#878580,bg=#1C1B1A] #I  #W \
#[fg=#1C1B1A,bg=#1C1B1A]"

# active: cyan-accented pill with arrows
set -g window-status-current-format "\
#[fg=#282726,bg=#1C1B1A]\
#[fg=#3AA99F,bg=#282726,bold] #I  #W \
#[fg=#282726,bg=#1C1B1A]"

# ── Pane borders ───────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#282726"
set -g pane-active-border-style "fg=#3AA99F"

# ── Command / message line ─────────────────────────────────────────────────────
set -g message-style         "bg=#282726,fg=#D0A215,bold"
set -g message-command-style "bg=#282726,fg=#DA702C"

# ── Copy mode ──────────────────────────────────────────────────────────────────
set -g mode-style "bg=#4385BE,fg=#100F0F"
