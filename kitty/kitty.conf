# ── Font ───────────────────────────────────────────────────────────────────────
font_family      DejaVuSansM Nerd Font Mono
bold_font        DejaVuSansM Nerd Font Mono Bold
italic_font      DejaVuSansM Nerd Font Mono Oblique
bold_italic_font DejaVuSansM Nerd Font Mono Bold Oblique
font_size        13.0

# ── Flexoki Dark ───────────────────────────────────────────────────────────────
# bg       #100F0F    bg2      #1C1B1A    bg3      #282726
# tx       #CECDC3    tx2      #6F6E69    tx3      #878580
# red      #D14D41    orange   #DA702C    yellow   #D0A215
# green    #879A39    cyan     #3AA99F    blue     #4385BE
# purple   #8B7EC8    magenta  #CE5D97

foreground              #CECDC3
background              #100F0F
selection_foreground    #100F0F
selection_background    #4385BE

# cursor
cursor                  #CECDC3
cursor_text_color       #100F0F

# url underline
url_color               #3AA99F

# 16 terminal colours
# black
color0  #100F0F
color8  #282726
# red
color1  #D14D41
color9  #D14D41
# green
color2  #879A39
color10 #879A39
# yellow
color3  #D0A215
color11 #D0A215
# blue
color4  #4385BE
color12 #4385BE
# magenta
color5  #CE5D97
color13 #CE5D97
# cyan
color6  #3AA99F
color14 #3AA99F
# white
color7  #CECDC3
color15 #CECDC3

# ── Window ─────────────────────────────────────────────────────────────────────
window_padding_width    8
hide_window_decorations no
background_opacity      1.0

# tab bar
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_background      #1C1B1A
tab_title_template      "{index}: {title}"
active_tab_foreground   #100F0F
active_tab_background   #3AA99F
active_tab_font_style   bold
inactive_tab_foreground #878580
inactive_tab_background #1C1B1A

# ── Behaviour ──────────────────────────────────────────────────────────────────
scrollback_lines        10000
enable_audio_bell       no
visual_bell_duration    0.0
copy_on_select          yes
strip_trailing_spaces   smart

# ── Shell integration ──────────────────────────────────────────────────────────
shell_integration       enabled
