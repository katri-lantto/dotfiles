# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# splitting windows
bind & split-window -h
bind % split-window -v
unbind '"'

# pane-switching without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# switch windows
# default prefix 0-9, n (next), w (browse windows)
bind p previous-window

# prevent auto-rename
set-option -g allow-rename off

# enable mouse control
set -g mouse on

# reload conf changes
bind r source-file ~/.tmux.conf \; display-message "config reloaded"

# keybinds reference popup (prefix + h)
# tries glow (rendered markdown) → bat → less as fallback
bind h display-popup \
  -T " Keybinds " \
  -w 90% -h 90% \
  -E "glow ~/.config/nvim/KEYBINDS.md 2>/dev/null || bat --style=plain ~/.config/nvim/KEYBINDS.md 2>/dev/null || less ~/.config/nvim/KEYBINDS.md"

set -g @plugin 'tmux-plugins/tpm'

# plugin list
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum' # auto saves every 15 mintues
set -g @continuum-restore 'on' # auto restore last saved env
# predefined searches and search result highlighting
set -g @plugin 'tmux-plugins/tmux-copycat'
# TODO: Possible improvement: Download gawk for better UTF-8 char support
set -g @plugin 'tmux-plugins/tmux-yank' # prefix-U to enter copy mode (prefix-y copies text to cliboard)
# TODO: Might require reattach-to-user-namespace for MACs alongside tmux-sensible plugin

# theme
source-file ~/.config/tmux/flexoki.conf

# auto clone tpm if non-existent
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# init tpm
run '~/.tmux/plugins/tpm/tpm'

